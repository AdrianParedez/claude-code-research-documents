<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" role="img" aria-labelledby="title desc">
  <title id="title">Claude Code Research banner</title>
  <desc id="desc">A banner for the Claude Code Research repository showing three paper cards and a prompt library tag.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f1e7" />
      <stop offset="100%" stop-color="#efe7da" />
    </linearGradient>
  </defs>
  <rect width="1200" height="280" rx="28" fill="url(#bg)" />
  <rect x="40" y="36" width="1120" height="208" rx="22" fill="#fffaf2" stroke="#d8cdbb" />
  <text x="72" y="82" fill="#8a5a2b" font-family="Consolas, 'Liberation Mono', Menlo, monospace" font-size="18" letter-spacing="2">CLAUDE / CLAUDE CODE</text>
  <text x="72" y="136" fill="#1f2937" font-family="Georgia, 'Times New Roman', serif" font-size="44" font-weight="700">Claude Code Research</text>
  <text x="72" y="174" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="22">Three papers. Twenty templates. One tidy docs-first repo.</text>
  <text x="72" y="208" fill="#4b5563" font-family="Arial, Helvetica, sans-serif" font-size="18">Prompting, systems analysis, and reusable prompt patterns.</text>

  <g transform="translate(742 48)">
    <rect x="0" y="0" width="360" height="52" rx="12" fill="#fffdf8" stroke="#d5c4ae" />
    <text x="18" y="24" fill="#111827" font-family="Consolas, 'Liberation Mono', Menlo, monospace" font-size="15">paper--claude--prompting.md</text>
    <text x="18" y="40" fill="#6b7280" font-family="Arial, Helvetica, sans-serif" font-size="13">task contracts over prompt tricks</text>

    <rect x="18" y="64" width="360" height="52" rx="12" fill="#fdf8ef" stroke="#d5c4ae" />
    <text x="36" y="88" fill="#111827" font-family="Consolas, 'Liberation Mono', Menlo, monospace" font-size="15">paper--claude-code--prompting.md</text>
    <text x="36" y="104" fill="#6b7280" font-family="Arial, Helvetica, sans-serif" font-size="13">agent briefs, context, autonomy, verification</text>

    <rect x="36" y="128" width="360" height="52" rx="12" fill="#fbf4e8" stroke="#d5c4ae" />
    <text x="54" y="152" fill="#111827" font-family="Consolas, 'Liberation Mono', Menlo, monospace" font-size="15">paper--claude-code--systems.md</text>
    <text x="54" y="168" fill="#6b7280" font-family="Arial, Helvetica, sans-serif" font-size="13">terminal, IDE, browser, automation surfaces</text>
  </g>

  <rect x="72" y="224" width="300" height="28" rx="14" fill="#1f2937" />
  <text x="92" y="243" fill="#f9fafb" font-family="Consolas, 'Liberation Mono', Menlo, monospace" font-size="14">prompts/templates/ - 20 reusable templates</text>
</svg>
